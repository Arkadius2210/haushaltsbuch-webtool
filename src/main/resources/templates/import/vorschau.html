<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head>
    <title>Import-Vorschau</title>
</head>
<body>
    <div layout:fragment="content">
        <h1 class="mb-4">Import-Vorschau</h1>

        <!-- Fehleranzeige -->
        <div th:if="${!vorschau.fehler().isEmpty()}" class="alert alert-danger" role="alert">
            <strong>Fehler beim Einlesen:</strong>
            <ul class="mb-0 mt-2">
                <li th:each="fehler : ${vorschau.fehler()}">
                    <span th:text="${fehler.arbeitsblatt()}">Blatt</span>,
                    Zeile <span th:text="${fehler.zeile()}">0</span>:
                    <span th:text="${fehler.fehlermeldung()}">Fehlermeldung</span>
                </li>
            </ul>
        </div>

        <!-- Sparkonten-Tabelle -->
        <h2 class="h4 mt-4">Sparkonten</h2>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th class="text-end">Standardbetrag</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="konto : ${vorschau.sparkonten()}">
                        <td th:text="${konto.name()}">Kontoname</td>
                        <td class="text-end"
                            th:text="${#numbers.formatDecimal(konto.standardbetrag(), 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(vorschau.sparkonten())}">
                        <td colspan="2" class="text-center text-muted">Keine Sparkonten erkannt.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Jahresausgaben-Tabelle -->
        <h2 class="h4 mt-4">Jahresausgaben</h2>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th class="text-end">Betrag</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ausgabe : ${vorschau.jahresausgaben()}">
                        <td th:text="${ausgabe.name()}">Ausgabenname</td>
                        <td class="text-end"
                            th:text="${#numbers.formatDecimal(ausgabe.jahresbetrag(), 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(vorschau.jahresausgaben())}">
                        <td colspan="2" class="text-center text-muted">Keine Jahresausgaben erkannt.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Aktionen -->
        <div class="mt-4 d-flex gap-2">
            <form th:action="@{/import/bestaetigen}" method="post">
                <!-- Sparkonten als Hidden Fields -->
                <div th:each="konto, stat : ${vorschau.sparkonten()}">
                    <input type="hidden" th:name="${'sparkonten[' + stat.index + '].name'}"
                           th:value="${konto.name()}"/>
                    <input type="hidden" th:name="${'sparkonten[' + stat.index + '].standardbetrag'}"
                           th:value="${konto.standardbetrag()}"/>
                </div>
                <!-- Jahresausgaben als Hidden Fields -->
                <div th:each="ausgabe, stat : ${vorschau.jahresausgaben()}">
                    <input type="hidden" th:name="${'jahresausgaben[' + stat.index + '].name'}"
                           th:value="${ausgabe.name()}"/>
                    <input type="hidden" th:name="${'jahresausgaben[' + stat.index + '].jahresbetrag'}"
                           th:value="${ausgabe.jahresbetrag()}"/>
                </div>
                <button type="submit" class="btn btn-success">Import bestätigen</button>
            </form>
            <a th:href="@{/import}" class="btn btn-outline-secondary">Abbrechen</a>
        </div>
    </div>
</body>
</html>
