<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head>
    <title>Jahresausgaben</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Jahresausgaben</h1>
            <a th:href="@{/jahresausgaben/neu}" class="btn btn-primary">Neue Jahresausgabe</a>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th class="text-end">Jahresbetrag</th>
                        <th class="text-end">Monatliche Rücklage</th>
                        <th class="text-center">Aktionen</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ausgabe : ${jahresausgaben}">
                        <td th:text="${ausgabe.name()}">Jahresausgabe</td>
                        <td class="text-end"
                            th:text="${#numbers.formatDecimal(ausgabe.jahresbetrag(), 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</td>
                        <td class="text-end"
                            th:text="${#numbers.formatDecimal(ausgabe.monatlicheRuecklage(), 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</td>
                        <td class="text-center">
                            <a th:href="@{/jahresausgaben/{id}/bearbeiten(id=${ausgabe.id()})}"
                               class="btn btn-sm btn-outline-secondary me-1">Bearbeiten</a>
                            <form th:action="@{/jahresausgaben/{id}/delete(id=${ausgabe.id()})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('Jahresausgabe wirklich löschen?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Löschen</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(jahresausgaben)}">
                        <td colspan="4" class="text-center text-muted">Keine Jahresausgaben vorhanden.</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="table-dark fw-bold">
                        <td>Gesamt</td>
                        <td class="text-end"></td>
                        <td class="text-end"
                            th:text="${#numbers.formatDecimal(gesamtMonatlicheRuecklage, 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</body>
</html>
