<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head>
    <title>Sparkonten</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Sparkonten</h1>
            <a th:href="@{/sparkonten/neu}" class="btn btn-primary">Neues Sparkonto</a>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Gesamtsaldo</h5>
                        <p class="card-text fs-3 fw-bold"
                           th:text="${#numbers.formatDecimal(gesamtsaldo, 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Monatlicher Gesamtbedarf</h5>
                        <p class="card-text fs-3 fw-bold"
                           th:text="${#numbers.formatDecimal(monatlichGesamtbedarf, 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th class="text-end">Kontostand</th>
                        <th class="text-end">Standardbetrag</th>
                        <th class="text-center">Aktionen</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="konto : ${sparkonten}">
                        <td th:text="${konto.name()}">Sparkonto</td>
                        <td class="text-end"
                            th:text="${#numbers.formatDecimal(konto.kontostand(), 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</td>
                        <td class="text-end"
                            th:text="${#numbers.formatDecimal(konto.standardbetrag(), 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</td>
                        <td class="text-center">
                            <a th:href="@{/sparkonten/{id}/bearbeiten(id=${konto.id()})}"
                               class="btn btn-sm btn-outline-secondary me-1">Bearbeiten</a>
                            <form th:action="@{/sparkonten/{id}/delete(id=${konto.id()})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('Sparkonto wirklich löschen?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Löschen</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(sparkonten)}">
                        <td colspan="4" class="text-center text-muted">Keine Sparkonten vorhanden.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
