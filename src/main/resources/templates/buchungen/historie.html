<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head>
    <title th:text="${historie.sparkontoName() + ' - Historie'}">Historie</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 th:text="${'Buchungshistorie: ' + historie.sparkontoName()}">Buchungshistorie</h1>
            <div class="text-end">
                <span class="fs-5">Aktueller Kontostand:</span>
                <span class="fs-4 fw-bold"
                      th:text="${#numbers.formatDecimal(historie.aktuellerSaldo(), 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</span>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <form th:hx-get="@{/buchungen/historie/{id}(id=${historie.sparkontoId()})}"
                      hx-target="#historie-tabelle"
                      hx-swap="outerHTML"
                      class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="von" class="form-label">Von</label>
                        <input type="date" class="form-control" id="von" name="von"
                               th:value="${von}"/>
                    </div>
                    <div class="col-md-4">
                        <label for="bis" class="form-label">Bis</label>
                        <input type="date" class="form-control" id="bis" name="bis"
                               th:value="${bis}"/>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-primary">Filtern</button>
                        <a th:href="@{/buchungen/historie/{id}(id=${historie.sparkontoId()})}"
                           class="btn btn-outline-secondary">Zurücksetzen</a>
                    </div>
                </form>
            </div>
        </div>

        <div th:fragment="tabelle" id="historie-tabelle">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Datum</th>
                            <th class="text-end">Betrag</th>
                            <th>Typ</th>
                            <th>Beschreibung</th>
                            <th class="text-end">Laufender Kontostand</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="buchung : ${historie.buchungen()}">
                            <td th:text="${#temporals.format(buchung.datum(), 'dd.MM.yyyy')}">01.01.2024</td>
                            <td class="text-end fw-bold"
                                th:classappend="${buchung.betrag().signum() >= 0 ? 'text-success' : 'text-danger'}"
                                th:text="${(buchung.betrag().signum() >= 0 ? '+' : '') + #numbers.formatDecimal(buchung.betrag(), 1, 'COMMA', 2, 'POINT') + ' €'}">+100,00 €</td>
                            <td th:switch="${buchung.typ()}">
                                <span th:case="'MONATSBUCHUNG'">Monatsbuchung</span>
                                <span th:case="'MANUELL'">Manuell</span>
                                <span th:case="'UMBUCHUNG'">Umbuchung</span>
                                <span th:case="*" th:text="${buchung.typ()}">Unbekannt</span>
                            </td>
                            <td th:text="${buchung.beschreibung() ?: '-'}">-</td>
                            <td class="text-end"
                                th:text="${buchung.laufenderKontostand() != null ? #numbers.formatDecimal(buchung.laufenderKontostand(), 1, 'COMMA', 2, 'POINT') + ' €' : '-'}">0,00 €</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(historie.buchungen())}">
                            <td colspan="5" class="text-center text-muted">Keine Buchungen vorhanden.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <a th:href="@{/sparkonten}" class="btn btn-outline-secondary mt-3">Zurück zur Übersicht</a>
    </div>
</body>
</html>
