<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head>
    <title>Monatsbuchung</title>
</head>
<body>
    <div layout:fragment="content">
        <h2>Monatsbuchung</h2>
        <p class="text-muted">Alle Standardbeträge auf einen Blick. Passen Sie Beträge an oder deaktivieren Sie einzelne Posten.</p>

        <form th:action="@{/buchungen/monatsbuchung}" method="post">
            <div class="mb-3">
                <label for="datum" class="form-label">Buchungsdatum</label>
                <input type="date" class="form-control" id="datum" name="datum"
                       th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required/>
            </div>

            <table class="table table-striped">
                <thead>
                    <tr>
                        <th scope="col">Aktiv</th>
                        <th scope="col">Sparkonto</th>
                        <th scope="col">Betrag (€)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="posten, stat : ${vorschau.posten()}">
                        <td>
                            <input type="hidden" th:name="${'posten[' + stat.index + '].sparkontoId'}"
                                   th:value="${posten.sparkontoId()}"/>
                            <input type="hidden" th:name="${'posten[' + stat.index + '].sparkontoName'}"
                                   th:value="${posten.sparkontoName()}"/>
                            <input type="hidden" th:name="${'posten[' + stat.index + '].aktiv'}" value="false"/>
                            <input type="checkbox" class="form-check-input"
                                   th:name="${'posten[' + stat.index + '].aktiv'}"
                                   value="true"
                                   th:checked="${posten.aktiv()}"/>
                        </td>
                        <td th:text="${posten.sparkontoName()}">Sparkonto Name</td>
                        <td>
                            <input type="number" step="0.01" class="form-control"
                                   th:name="${'posten[' + stat.index + '].betrag'}"
                                   th:value="${posten.betrag()}"
                                   style="max-width: 150px;"/>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="mb-3">
                <strong>Gesamtbetrag: </strong>
                <span th:text="${#numbers.formatDecimal(vorschau.gesamtbetrag(), 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</span>
            </div>

            <button type="submit" class="btn btn-primary">Monatsbuchung durchführen</button>
            <a th:href="@{/sparkonten}" class="btn btn-outline-secondary ms-2">Abbrechen</a>
        </form>
    </div>
</body>
</html>
