<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE - Haushaltsbuch">Haushaltsbuch</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}"/>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" sec:authorize="isAuthenticated()">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/sparkonten}">Haushaltsbuch</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav"
                    aria-expanded="false" aria-label="Navigation umschalten">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/sparkonten}">Sparkonten</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/buchungen/monatsbuchung}">Monatsbuchung</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/buchungen/manuell}">Manuelle Buchung</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/buchungen/umbuchung}">Umbuchung</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/jahresausgaben}">Jahresausgaben</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/import}">Import</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="navbar-text me-3" id="gesamtsaldo"
                          th:fragment="gesamtsaldo(saldo)">
                        Gesamtsaldo: <strong th:text="${#numbers.formatDecimal(saldo ?: 0, 1, 'COMMA', 2, 'POINT') + ' €'}">0,00 €</strong>
                    </span>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">Abmelden</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div layout:fragment="content">
            <!-- Child template content goes here -->
        </div>
    </main>

    <script th:src="@{/webjars/htmx.org/1.9.10/dist/htmx.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
