server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SSL_KEY_STORE_TYPE:PKCS12}

spring:
  datasource:
    url: jdbc:sqlite:${DB_PATH:./data/haushaltsbuch.db}?date_string_format=yyyy-MM-dd HH:mm:ss
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    de.haushaltsbuch: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: prod

  thymeleaf:
    cache: true

logging:
  level:
    de.haushaltsbuch: INFO
    org.springframework.security: WARN
